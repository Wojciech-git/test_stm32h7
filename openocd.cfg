# Custom OpenOCD config for STM32H753ZI (NUCLEO-H743ZI board)
source [find target/stm32h7x.cfg]

# The target must be held in reset during connect, otherwise the debug
# interface is unresponsive (application may disable debug clocks or
# enter low-power mode). This is needed after flashing on this board.
reset_config srst_only connect_assert_srst

# Enable RTOS auto-detection
stm32h7x.cpu0 configure -rtos auto

# Halt target when GDB connects
stm32h7x.cpu0 configure -event gdb-attach { reset halt }
